<!DOCTYPE html>
<html lang="ja">
<head>
    <title>リアルタイム人数カウント</title>
    <link rel="stylesheet" href="style.css">
    <!-- TensorFlow.js と BlazeFace モデルの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.1.0/dist/blazeface.min.umd.min.js"></script>
</head>
<body>

    <!-- 人数を表示するエリア -->
    <div id="counter-container">
        <span id="count-text">人数: 0人</span>
    </div>

    <!-- 裏側で処理するためのビデオタグ（画面上は非表示） -->
    <video id="webcam" autoplay playsinline muted></video>

    <script src="script.js"></script>
</body>
</html>
